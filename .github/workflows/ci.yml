name: Student Course System CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code from GitHub
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Set up Java 17 (JDK) with Maven Dependency Caching
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Run Maven Compilation and JUnit Tests on Backend Codebase
    - name: Build and Test Backend with Maven
      run: |
        cd backend
        mvn -B clean package
        
    # Step 4: Set up Docker Buildx for multi-platform builders
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 5: Authenticate with Docker Hub using secure organization credentials
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      # Standard fail-safe configuration for offline checkouts/forks
      continue-on-error: true

    # Step 6: Build & Publish Backend Docker Image
    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME || 'example' }}/student-backend:latest
          ${{ secrets.DOCKER_USERNAME || 'example' }}/student-backend:${{ github.sha }}

    # Step 7: Build & Publish Frontend Nginx Docker Image
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME || 'example' }}/student-frontend:latest
          ${{ secrets.DOCKER_USERNAME || 'example' }}/student-frontend:${{ github.sha }}
