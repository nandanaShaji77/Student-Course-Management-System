# Database Connection Configuration (Utilizes Environment Variables securely)
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:studentdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Actuator Health Check Configurations
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging Level and Pattern Configurations
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.example.studentcourse=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/student-course-app.log
